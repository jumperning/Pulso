<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OnceyDoce — Iniciar sesión</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary":"#2b3896","on-primary":"#ffffff",
          "primary-container":"#4551af","on-primary-container":"#cbcfff",
          "secondary":"#4858ab","secondary-container":"#96a5ff","on-secondary-container":"#27378a",
          "tertiary":"#004c44","on-tertiary":"#ffffff",
          "tertiary-container":"#00665b","on-tertiary-container":"#7ce4d3",
          "error":"#ba1a1a","error-container":"#ffdad6","on-error-container":"#93000a",
          "surface":"#f4faff","surface-dim":"#cfdce4",
          "surface-container-lowest":"#ffffff","surface-container-low":"#e9f6fd",
          "surface-container":"#e3f0f8","surface-container-high":"#ddeaf2","surface-container-highest":"#d7e4ec",
          "on-surface":"#111d23","on-surface-variant":"#454652",
          "outline":"#757684","outline-variant":"#c5c5d4","background":"#f4faff",
        },
        borderRadius:{"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"},
        fontFamily:{"headline":["Manrope"],"body":["Inter"]}
      }
    }
  }
</script>
<style>
  body { font-family:'Inter',sans-serif; }
  .font-headline,h1,h2,h3,h4 { font-family:'Manrope',sans-serif; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin   { to{transform:rotate(360deg)} }
  .fade-up { animation:fadeUp .4s ease forwards; }
  .spin    { animation:spin 1.5s linear infinite; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4">

<!-- Decorative blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
</div>

<div class="w-full max-w-md fade-up relative z-10">

  <!-- Logo + header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-3 mb-6">
      <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL' 1;">restaurant</span>
      </div>
      <h1 class="font-headline font-black text-2xl text-primary tracking-tight">OnceyDoce</h1>
    </div>
    <h2 class="text-3xl font-headline font-extrabold text-on-surface mb-2">Bienvenido de vuelta</h2>
    <p class="text-on-surface-variant text-sm">Ingresá con tu cuenta para acceder al POS.</p>
  </div>

  <!-- Login card -->
  <div class="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/30">

    <!-- Email -->
    <div class="mb-4">
      <label class="block text-[10px] font-black text-outline uppercase tracking-widest mb-1.5 px-1">Email</label>
      <input id="log-email" type="email" placeholder="vos@ejemplo.com" autocomplete="email"
        class="w-full bg-surface-container-high border-2 border-transparent rounded-2xl py-3.5 px-4 text-sm font-bold text-on-surface placeholder:text-outline focus:border-primary focus:bg-white focus:ring-0 outline-none transition-all"/>
    </div>

    <!-- Contraseña -->
    <div class="mb-5">
      <label class="block text-[10px] font-black text-outline uppercase tracking-widest mb-1.5 px-1">Contraseña</label>
      <div class="relative">
        <input id="log-password" type="password" placeholder="Tu contraseña" autocomplete="current-password"
          class="w-full bg-surface-container-high border-2 border-transparent rounded-2xl py-3.5 px-4 pr-12 text-sm font-bold text-on-surface placeholder:text-outline focus:border-primary focus:bg-white focus:ring-0 outline-none transition-all"/>
        <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined text-sm" id="pwd-eye">visibility</span>
        </button>
      </div>
    </div>

    <!-- Error -->
    <div id="log-error" class="hidden mb-4 flex items-center gap-2 bg-error-container/50 text-on-error-container px-4 py-3 rounded-2xl text-sm font-bold">
      <span class="material-symbols-outlined text-base text-error">error</span>
      <span id="log-error-text"></span>
    </div>

    <!-- Botón login -->
    <button onclick="doLogin()" id="btn-login"
      class="w-full bg-primary text-on-primary py-4 rounded-full font-headline font-black text-base shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-sm">login</span>
      Iniciar sesión
    </button>

    <!-- Aviso de acceso cerrado -->
    <p class="text-center text-xs text-on-surface-variant mt-5 leading-relaxed">
      El acceso a OnceyDoce es <strong class="text-on-surface">solo por invitación</strong>.<br/>
      Si no tenés cuenta, contactá al administrador.
    </p>

  </div>

  <!-- Footer -->
  <p class="text-center text-[11px] text-on-surface-variant mt-6">© 2025 OnceyDoce POS</p>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-on-surface text-surface-container-lowest px-5 py-3 rounded-full text-sm font-bold shadow-2xl z-[200] opacity-0 pointer-events-none transition-opacity duration-300 flex items-center gap-2 whitespace-nowrap"></div>

<script>
  const API_URL = 'https://pulsoback.onrender.com';
  const HEADERS = { 'Content-Type': 'application/json' };

  // ── Si ya hay sesión activa, redirigir directamente ──
  (function checkExistingSession() {
    const token = localStorage.getItem('od_token');
    const user  = localStorage.getItem('od_user');
    if (!token || !user) return;
    // Tiene sesión → ir al dashboard o al setup según si tiene negocio
    const bizId = localStorage.getItem('od_business_id');
    window.location.href = bizId ? 'index.html' : 'setup.html';
  })();

  function togglePwd() {
    const input = document.getElementById('log-password');
    const eye   = document.getElementById('pwd-eye');
    const hidden = input.type === 'password';
    input.type  = hidden ? 'text' : 'password';
    eye.textContent = hidden ? 'visibility_off' : 'visibility';
  }

  function setError(msg) {
    const el = document.getElementById('log-error');
    document.getElementById('log-error-text').textContent = msg;
    el.classList.remove('hidden');
    el.classList.add('flex');
  }
  function clearError() {
    document.getElementById('log-error').classList.add('hidden');
    document.getElementById('log-error').classList.remove('flex');
  }

  function setBtnLoading(loading) {
    const btn = document.getElementById('btn-login');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="material-symbols-outlined text-sm spin">progress_activity</span>Verificando...`
      : `<span class="material-symbols-outlined text-sm">login</span>Iniciar sesión`;
  }

  async function doLogin() {
    clearError();
    const email    = document.getElementById('log-email').value.trim();
    const password = document.getElementById('log-password').value;

    if (!email || !password) { setError('Ingresá tu email y contraseña'); return; }

    setBtnLoading(true);
    try {
      const res  = await fetch(`${API_URL}/auth/login`, {
        method: 'POST', headers: HEADERS,
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      // El backend devuelve 401/403 si el usuario no existe o no está habilitado
      if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
          throw new Error('Email o contraseña incorrectos, o tu cuenta no está habilitada.');
        }
        throw new Error(data.message || 'No se pudo iniciar sesión.');
      }

      // Guardar sesión
      localStorage.setItem('od_token', data.token);
      localStorage.setItem('od_user',  JSON.stringify(data.user));
      if (data.businessId) localStorage.setItem('od_business_id', data.businessId);
      if (data.business)   localStorage.setItem('od_business',    JSON.stringify(data.business));

      showToast(`¡Bienvenido/a, ${data.user?.firstName || email}!`);

      setTimeout(() => {
        // Si ya completó el setup → dashboard; si no → setup wizard
        window.location.href = data.businessId ? 'index.html' : 'setup.html';
      }, 700);

    } catch (e) {
      setError(e.message);
    } finally {
      setBtnLoading(false);
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<span class="material-symbols-outlined text-sm">check_circle</span>${msg}`;
    toast.style.opacity = '1';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.style.opacity = '0', 3000);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
